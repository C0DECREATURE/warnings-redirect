<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		
		<title>Warnings</title>
		
		<!--this page's stylesheet-->
		<link href="stylesheet.css" rel="stylesheet" type="text/css" media="all">
	</head>
	<body>
		<form id="accept-warnings">
			<h1>Warnings</h1>
			
			<p>This website contains content. You have been warned.</p>
			
			<!-- checkbox option to not show warnings again -->
			<p>
				<input id="dont-show-again" type="checkbox" checked></input>
				<label for="dont-show-again">Don't show this warning again during this session.</label>
			</p>
			
			<!-- checkbox option to not show warnings again -->
			<p>
				<input id="dont-show-again-ever" type="checkbox"></input>
				<label for="dont-show-again-ever">Don't show this warning ever again.</label>
			</p>
			
			<div class="bottom-buttons">
				<!-- button to reject the warnings and go back to the homepage -->
				<button class="go-back" type="button" onclick="window.location='/';">Return Home</button>
				<!-- button to accept the warnings and redirect the user -->
				<button class="accept" type="button" onclick="acceptWarnings();">Accept Warnings</button>
			<div>
		</form>
		<script>
			// this function is called when the user clicks the button to accept warnings
			// it saves the "don't show again" setting and redirects the user to the requested page
			function acceptWarnings() {
				let form = document.getElementById('warnings-form');
				// log that user has accepted warnings on this browser
				console.log(window.location.href);
				
				// the URL to redirect the user to after they accept the warnings
				let urlParams = new URL(window.location.href).searchParams;
				let redirect = urlParams.has("redirect") ? urlParams.get("redirect") : "/";
				
				// check whether to show warnings in the future
				let dontShowAgain = document.getElementById('dont-show-again') ? document.getElementById('dont-show-again').checked : false;
				let dontShowAgainEver = document.getElementById('dont-show-again-ever') ? document.getElementById('dont-show-again-ever').checked : false;
				if (dontShowAgainEver) {
					// if the user asked not to be shown this warnings again EVER,
					// save that preference to the browser
					let warningsName = window.location.pathname.replaceAll('/','');
					localStorage.setItem('showWarnings'+warningsName, false );
				} else if (dontShowAgain) {
					// if the user asked not to be shown this warnings again FOR THIS SESSION,
					// save that preference to the browser
					let warningsName = window.location.pathname.replaceAll('/','');
					sessionStorage.setItem('showWarnings'+warningsName, false );
				} else {
					// if the user wants to be shown warnings again,
					// load the redirect page with a one-time preference to not show the warnings
					redirect += '?showWarnings=false';
				}
				
				// go to the specified redirect page
				window.location.href = redirect;
			}
		</script>
	</body>
</html>
